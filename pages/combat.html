<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/hud.css">
  <link rel="stylesheet" href="/css/combat-log.css">
  <link rel="icon" href="/assets/images/icons/favicon.png" type="image/png">

  <title>Retro Dungeon</title>
</head>

<body>
  <main>
    <section id="combat-display">
      <article class="hud">
        <h3 id="monster-name">Golem</h3>
        <div class="hud-wrapper">
          <div class="hp-bar" id="monster-hp-bar">
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
          </div>
          <div class="ac-wrapper">
            <p id="monster-ac">12</p>
            <img class="icon" src="/assets/images/icons/shield.png" alt="Shield Sprite">
          </div>
        </div>
        <p id="monster-hp"> PV: 70/70</p>
      </article>
      <img id="monster-art" src="/assets/images/monsters/golem.png" alt="Monster Sprite">
      <article class="hud">
        <h3 id="player-name">Jogador</h3>
        <div class="hud-wrapper">
          <div class="hp-bar" id="player-hp-bar">
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
            <div class="hp-part"></div>
          </div>
          <div class="ac-wrapper">
            <p id="player-ac">14</p>
            <img class="icon" src="/assets/images/icons/shield.png" alt="Shield Sprite">
          </div>
        </div>
        <p id="player-hp">PV: 30/30</p>
      </article>
    </section>
    <section class="menu menu-combat">
      <div>
        <button class="btn" id="btn-attack">
          ATACAR
        </button>
        <button class="btn" id="btn-heal">
          CURAR
        </button>
      </div>
      <div>
        <button class="btn" id="btn-spell">
          MAGIA
        </button>
        <button class="btn" id="btn-surrender">
          RENDER-SE
        </button>
      </div>
    </section>
  </main>
  <script type="module" src="/js/pages/combat.js"></script>
</body>

</html>
